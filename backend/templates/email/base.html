<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Al Merak AML{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%);border-radius:16px 16px 0 0;padding:32px 40px;text-align:center;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <div style="display:inline-flex;align-items:center;gap:10px;">
                      <div style="width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:10px;display:inline-block;line-height:36px;text-align:center;vertical-align:middle;">
                        <span style="color:#fff;font-size:18px;font-weight:900;">A</span>
                      </div>
                      <span style="color:#fff;font-size:20px;font-weight:800;vertical-align:middle;margin-left:8px;">Al Merak AML</span>
                    </div>
                    <p style="color:rgba(255,255,255,0.75);font-size:12px;margin:6px 0 0 0;letter-spacing:0.5px;">UAE AML Compliance Platform</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:40px 40px 32px 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f8fafc;border-radius:0 0 16px 16px;border-top:1px solid #e2e8f0;padding:24px 40px;text-align:center;">
              <p style="color:#94a3b8;font-size:12px;margin:0 0 6px 0;">
                Al Merak AML · UAE Financial Intelligence Platform
              </p>
              <p style="color:#cbd5e1;font-size:11px;margin:0;">
                This is an automated message. Please do not reply to this email.
              </p>
              <p style="color:#cbd5e1;font-size:11px;margin:8px 0 0 0;">
                © 2026 Al Merak. All rights reserved.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
